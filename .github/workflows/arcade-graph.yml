      - name: Add IvanOS activity header
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          files = [
              Path("dist/bomberman-contribution-graph.svg"),
              Path("dist/bomberman-contribution-graph-dark.svg"),
          ]

          header = '''
            <defs>
              <linearGradient id="ivanAccent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
                <stop stop-color="#58A6FF"/>
                <stop offset="0.5" stop-color="#A78BFA"/>
                <stop offset="1" stop-color="#2DD4BF"/>
              </linearGradient>
            </defs>

            <rect x="24" y="28" width="420" height="74" rx="18" fill="#0D1117" opacity="0.72"/>
            <rect x="24" y="28" width="420" height="74" rx="18" fill="none" stroke="#30363D" stroke-width="1"/>

            <circle cx="58" cy="65" r="8" fill="#2DD4BF"/>
            <text x="78" y="58" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
              Activity Monitor
            </text>
            <text x="78" y="82" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">
              Contribution movement powered by GitHub Actions
            </text>

            <rect x="470" y="44" width="118" height="32" rx="16" fill="#111827" stroke="#30363D"/>
            <text x="498" y="65" fill="#58A6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
              LIVE
            </text>

            <rect x="604" y="44" width="150" height="32" rx="16" fill="#111827" stroke="#30363D"/>
            <text x="631" y="65" fill="#A78BFA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
              AMSEPH
            </text>

            <rect x="770" y="44" width="192" height="32" rx="16" fill="#111827" stroke="#30363D"/>
            <text x="800" y="65" fill="#2DD4BF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
              IVANOS TELEMETRY
            </text>

            <rect x="24" y="118" width="938" height="2" rx="1" fill="url(#ivanAccent)" opacity="0.75"/>
          '''

          for file in files:
              if not file.exists():
                  print(f"Skipped missing file: {file}")
                  continue

              svg = file.read_text(encoding="utf-8")

              # Remove old injected header if workflow reruns
              svg = re.sub(
                  r'<!-- IVANOS-ACTIVITY-HEADER-START -->.*?<!-- IVANOS-ACTIVITY-HEADER-END -->',
                  '',
                  svg,
                  flags=re.DOTALL
              )

              injected = f'''
              <!-- IVANOS-ACTIVITY-HEADER-START -->
              {header}
              <!-- IVANOS-ACTIVITY-HEADER-END -->
              '''

              svg = svg.replace(">", ">" + injected, 1)

              file.write_text(svg, encoding="utf-8")
              print(f"Added IvanOS header to {file}")
          PY